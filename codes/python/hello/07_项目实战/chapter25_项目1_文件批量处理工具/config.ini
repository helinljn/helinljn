; ============================================================
; 文件批量处理工具 - 配置文件
; ============================================================

[DEFAULT]
; 日志级别: DEBUG / INFO / WARNING / ERROR / CRITICAL
log_level = INFO

; 日志文件路径（相对路径或绝对路径）
log_file = file_processor.log

; 日志文件最大大小（字节），默认 1MB
log_max_bytes = 1048576

; 日志文件保留份数
log_backup_count = 3

; 是否启用备份（重命名/替换前备份原文件）
backup_enabled = true

; 备份文件后缀
backup_suffix = .bak

; 是否递归搜索子目录
recursive = true

; 是否忽略隐藏文件（以 . 开头）
ignore_hidden = true

; 是否为演练模式（不实际修改文件，仅显示将要执行的操作）
dry_run = false

; 文本文件默认编码
encoding = utf-8


[SEARCH]
; 搜索相关配置（继承 DEFAULT，可单独覆盖）
recursive = true
ignore_hidden = true


[RENAME]
; 重命名相关配置
dry_run = false
create_backup = true


[REPLACE]
; 内容替换相关配置
dry_run = false
backup_enabled = true
encoding = utf-8
