[database]
# SQLite 数据库文件路径
db_file = logs.db

[parser]
# 默认日志格式: apache, nginx, combined
default_format = apache
# 批量插入数据库的记录数
batch_size = 1000

[analyzer]
# 排名统计的 TOP N 数量
top_n = 10
# 时间段分析的时间间隔（小时）
time_interval = 1

[reporter]
# 默认报告格式: console, json, csv
default_format = console
# 输出目录
output_dir = reports

[logging]
# 日志级别: DEBUG, INFO, WARNING, ERROR, CRITICAL
level = INFO
# 日志文件路径（为空则只输出到控制台）
log_file = analyzer.log
# 日志文件最大大小（字节），超过后轮转
max_bytes = 10485760
# 保留的日志文件数量
backup_count = 3
