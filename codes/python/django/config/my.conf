# MySQL 8.0.45 configuration for this Django project.
# Suggested placement on Ubuntu 24.04:
#   /etc/mysql/conf.d/my.conf
# or
#   /etc/mysql/mysql.conf.d/mysqld.cnf

[client]
port = 3306
default-character-set = utf8mb4

[mysql]
default-character-set = utf8mb4

[mysqld]
port = 3306
bind-address = 127.0.0.1
mysqlx-bind-address = 127.0.0.1
mysqlx = 0
character-set-server = utf8mb4
collation-server = utf8mb4_unicode_ci
default-time-zone = '+08:00'
skip-name-resolve
local-infile = 0

# Django/MySQL compatibility.
sql-mode = STRICT_TRANS_TABLES,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION
transaction-isolation = READ-COMMITTED

# Conservative defaults for this GM admin project.
max_connections = 200
connect_timeout = 10
wait_timeout = 300
interactive_timeout = 300
max_allowed_packet = 64M
table_open_cache = 2048
thread_cache_size = 32
tmp_table_size = 64M
max_heap_table_size = 64M

# InnoDB.
innodb_file_per_table = 1
innodb_buffer_pool_size = 256M
innodb_redo_log_capacity = 256M
innodb_flush_log_at_trx_commit = 1

# Uncomment only if you want remote connections from other hosts:
# bind-address = 0.0.0.0
# mysqlx-bind-address = 0.0.0.0
