{# 注意：错误页面不继承 base.html，因为错误发生时 URL resolver 和上下文处理器可能不可用 #}
{% load i18n static %}<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% trans "服务器错误" %} - {% trans "GM命令管理系统" %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.2.0/dist/css/tabler.min.css">
    <link rel="stylesheet" href="{% static 'gmtool/vendor/tabler-icons/tabler-icons.min.css' %}">
    <link rel="stylesheet" href="{% static 'gmtool/css/app.css' %}">
</head>
<body>
    <div class="gm-error-page">
        <div class="gm-error-card card">
            <div class="gm-error-topline"></div>
            <div class="card-body text-center p-5">
                <div class="gm-error-icon mb-3">
                    <i class="ti ti-alert-triangle"></i>
                </div>
                <div class="gm-error-code">500</div>
                <h2 class="mt-3 mb-2">{% trans "服务器错误" %}</h2>
                <p class="gm-error-copy mb-4">{% trans "抱歉，服务器处理请求时遇到了问题，请稍后再试。" %}</p>
                <a href="/gmtool/" class="btn btn-primary btn-lg">
                    <i class="ti ti-home me-2"></i>{% trans "返回首页" %}
                </a>
            </div>
        </div>
    </div>
</body>
</html>
