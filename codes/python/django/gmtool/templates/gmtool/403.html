<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>访问被拒绝 - GM命令管理系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.2.0/dist/css/tabler.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }
        .error-card {
            max-width: 480px;
            width: 100%;
            border: none;
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15);
        }
        .error-code {
            font-size: 8rem;
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body>
    <div class="error-page p-3">
        <div class="error-card card">
            <div class="card-body text-center p-5">
                <div class="mb-3">
                    <i class="ti ti-lock" style="font-size: 4rem; color: #fa709a;"></i>
                </div>
                <div class="error-code">403</div>
                <h2 class="mt-3 mb-2">访问被拒绝</h2>
                <p class="text-muted mb-4">抱歉，您没有权限访问此页面。</p>
                <a href="/gmtool/" class="btn btn-warning btn-lg">
                    <i class="ti ti-home me-2"></i>返回首页
                </a>
            </div>
        </div>
    </div>
</body>
</html>
