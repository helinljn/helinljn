<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - GM命令管理系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.2.0/dist/css/tabler.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
</head>
<body class="d-flex flex-column">
    <div class="page page-center">
        <div class="container container-tight py-4">
            <div class="text-center mb-4">
                <a href="{% url 'gmtool:login' %}" class="navbar-brand navbar-brand-autodark">
                    <i class="ti ti-command me-2" style="font-size:2rem;"></i>GM命令管理系统
                </a>
            </div>
            <div class="card card-md">
                <div class="card-body">
                    {% if already_logged_in %}
                    <h2 class="h2 text-center mb-4">已登录</h2>
                    <div class="alert alert-info mb-3">
                        <i class="ti ti-info-circle me-2"></i>当前已以 <strong>{{ current_user.username }}</strong> 身份登录。
                    </div>
                    <div class="form-footer">
                        <a href="{% url 'gmtool:dashboard' %}" class="btn btn-primary w-100 mb-2">
                            <i class="ti ti-home me-2"></i>进入系统
                        </a>
                        <form method="post" action="{% url 'gmtool:logout' %}" class="w-100">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-outline-secondary w-100">
                                <i class="ti ti-switch-horizontal me-2"></i>切换账号
                            </button>
                        </form>
                    </div>
                    {% else %}
                    <h2 class="h2 text-center mb-4">登录你的账号</h2>
                    {% if error %}
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="ti ti-alert-circle me-2"></i>{{ error }}
                        <a class="btn-close" data-bs-dismiss="alert"></a>
                    </div>
                    {% endif %}
                    {% if messages %}
                    {% for msg in messages %}
                    <div class="alert alert-warning alert-dismissible fade show" role="alert">
                        <i class="ti ti-alert-triangle me-2"></i>{{ msg }}
                        <a class="btn-close" data-bs-dismiss="alert"></a>
                    </div>
                    {% endfor %}
                    {% endif %}
                    <form method="post" autocomplete="off">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label required">用户名</label>
                            <div class="input-group input-group-flat">
                                <span class="input-group-text">
                                    <i class="ti ti-user"></i>
                                </span>
                                <input type="text" name="username" class="form-control" placeholder="请输入用户名" required autofocus>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label required">
                                密码
                            </label>
                            <div class="input-group input-group-flat">
                                <span class="input-group-text">
                                    <i class="ti ti-lock"></i>
                                </span>
                                <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
                            </div>
                        </div>
                        <div class="form-footer">
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="ti ti-login me-2"></i>登录
                            </button>
                        </div>
                    </form>
                    {% endif %}
                </div>
            </div>
            <div class="text-center text-muted mt-3">
                GM命令管理系统 &copy; 2026
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.2.0/dist/js/tabler.min.js"></script>
</body>
</html>
