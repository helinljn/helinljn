<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="panel">
        <h1>AI 聊天</h1>
        <p class="panel-desc">支持通过固定下拉选项选择第三方 API Base URL、API Key 和模型 ID 进行聊天。</p>

        <div class="field-group">
          <label for="apiBase">API Base URL</label>
          <select id="apiBase"></select>
        </div>

        <div class="field-group">
          <label for="apiKey">API Key</label>
          <select id="apiKey"></select>
        </div>

        <div class="field-group">
          <label for="modelId">模型 ID</label>
          <select id="modelId"></select>
        </div>

        <div class="button-group">
          <button id="clearChatBtn" class="danger-btn">清空聊天</button>
        </div>

        <div class="status-box" id="statusBox">等待操作</div>
      </div>
    </aside>

    <main class="chat-area">
      <div class="chat-header">
        <div>
          <h2>会话窗口</h2>
          <p>当前会话仅在本次页面使用期间保留</p>
        </div>
      </div>

      <section id="chatMessages" class="chat-messages">
        <div class="empty-state" id="emptyState">
          <h3>开始聊天</h3>
          <p>先在左侧填写 API Base URL、API Key 和模型 ID，然后发送消息。</p>
        </div>
      </section>

      <section class="composer">
        <label class="composer-label" for="userInput">输入消息</label>
        <textarea id="userInput" rows="4" placeholder="输入你想发送给 AI 的内容"></textarea>
        <div class="composer-actions">
          <button id="sendBtn" class="primary-btn">发送</button>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
